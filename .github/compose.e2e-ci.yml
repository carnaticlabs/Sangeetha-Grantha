# CI overlay for the nightly E2E workflow (TRACK-113).
#
# The postgres:18 image expects its volume mounted at /var/lib/postgresql
# (18+ layout); the base compose.yaml still mounts at .../data, which only
# works on volumes initialized under the old layout. Fresh CI runners hit
# "database files are incompatible" — override the mount here. The base file
# is left untouched so existing local dev volumes keep working.
services:
  db:
    volumes: !override
      - ci-pgdata:/var/lib/postgresql

volumes:
  ci-pgdata:
