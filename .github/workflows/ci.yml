name: CI

# TRACK-111 (Steps 3–4): blocking, PR-triggered gate across all layers (D7/D8).
# Testcontainers needs no special config on hosted runners — Docker is preinstalled on ubuntu-latest.
# Required-status-check enforcement on `main` is a branch-protection SETTING (configure once in the
# GitHub repo settings); this file defines the checks, it cannot mark them "required".
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Doc links resolve
    runs-on: ubuntu-latest
    # Cheapest job in the matrix: no toolchain, no services — just a filesystem walk.
    # Runs alongside the others, so a broken link never delays real test feedback.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      # ubuntu-latest ships Python 3.12; the script needs no third-party packages.
      - name: Check relative Markdown links
        run: python3 tools/check-doc-links.py

  backend-unit:
    name: Backend unit (<30s, D9)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      - name: Unit tests (no database)
        run: ./gradlew :modules:backend:api:unitTest --console=plain

  backend-integration:
    name: Backend integration (<3min, D9)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      - name: Integration tests (Testcontainers + Flyway)
        run: ./gradlew :modules:backend:dal:integrationTest :modules:backend:api:integrationTest --console=plain

  migrations:
    name: Flyway validate + migrate-from-scratch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sangita_grantha_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - name: Migrate from scratch + validate (Flyway 12.9.0)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/database/migrations:/flyway/sql" \
            flyway/flyway:12.9.0-alpine \
            -url="jdbc:postgresql://localhost:5432/sangita_grantha_ci" \
            -user=postgres -password=postgres -locations=filesystem:/flyway/sql \
            -baselineOnMigrate=false migrate validate

  frontend:
    name: Frontend typecheck + unit tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: modules/frontend/sangita-admin-web
    steps:
      - uses: actions/checkout@v7
      # Bun is pinned to the version in .mise.toml so CI and local dev agree, and
      # so setup-bun resolves a concrete release instead of looking "latest" up
      # through the GitHub tags API — that lookup 503'd and sank the 2026-07-16
      # nightly. The fallback covers whatever transient failure remains: bun is a
      # hard prerequisite here, so a network blip should cost a retry, not a run.
      - name: Set up Bun
        id: setup_bun
        continue-on-error: true
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Install Bun directly (fallback, retried)
        if: steps.setup_bun.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::warning::setup-bun failed; falling back to the direct installer"
          for attempt in 1 2 3; do
            echo "bun install attempt $attempt/3"
            if curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors \
                 https://bun.sh/install | bash -s "bun-v1.3.7"; then
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "::error::Bun could not be installed — setup-bun failed and the direct installer failed 3 times" >&2
          exit 1

      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc -b
      - name: Unit tests (Vitest, TRACK-118)
        run: bun run test:unit
      - name: Build
        run: bun run build

  worker:
    name: Worker lint + typecheck + pytest
    runs-on: ubuntu-latest
    # TRACK-113: integration tests pull postgres + flyway images on a cold runner
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tools/krithi-extract-enrich-worker
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        # v8 line publishes exact tags only (no moving major alias) — pin the release.
        uses: astral-sh/setup-uv@v8.3.2
      - name: Sync deps (incl. dev extra for pytest)
        run: uv sync --frozen --extra dev
      # TRACK-126: the worker is at zero ruff/mypy errors. These three steps
      # keep it there — any regression fails the build.
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy .
      - name: Pytest
        run: uv run pytest
