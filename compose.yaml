services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sangita_grantha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: [ "dev", "prod" ]
    build:
      context: .
      dockerfile: modules/backend/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sangita_grantha
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

  extraction:
    profiles: [ "dev", "prod" ]
    build:
      context: ./tools/krithi-extract-enrich-worker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sangita_grantha
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tools/krithi-extract-enrich-worker/src:/app/src:ro

  frontend:
    profiles: [ "dev" ]
    build:
      context: ./modules/frontend/sangita-admin-web
      dockerfile: Dockerfile.dev
    ports:
      - "5001:5001"
    volumes:
      - ./modules/frontend/sangita-admin-web/src:/app/src:ro
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  pgdata:
