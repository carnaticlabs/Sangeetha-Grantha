services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sangita_grantha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Run migrations before any app service starts
  migrate:
    profiles: [ "dev", "prod" ]
    image: python:3.14-slim
    working_dir: /app
    command: >
      sh -c "pip install -q 'psycopg[binary]>=3.1.0' && python -m db_migrate migrate"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sangita_grantha
      DB_USER: postgres
      DB_PASSWORD: postgres
      PYTHONPATH: /app/tools/db-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tools/db-migrate:/app/tools/db-migrate:ro
      - ./database/migrations:/app/database/migrations:ro

  # Dev backend: mounts source + Gradle cache, runs via gradlew (fast incremental builds)
  backend:
    profiles: [ "dev" ]
    image: eclipse-temurin:25-jdk
    working_dir: /app
    command: ./gradlew :modules:backend:api:run --no-daemon
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sangita_grantha
      DB_USER: postgres
      DB_PASSWORD: postgres
      GRADLE_USER_HOME: /gradle-cache
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - gradle-cache:/gradle-cache

  # Prod backend: builds fat JAR via Dockerfile
  backend-prod:
    profiles: [ "prod" ]
    build:
      context: .
      dockerfile: modules/backend/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sangita_grantha
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  extraction:
    profiles: [ "dev", "prod" ]
    build:
      context: ./tools/krithi-extract-enrich-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sangita_grantha
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./tools/krithi-extract-enrich-worker/src:/app/src:ro
      - extraction-cache:/app/cache
      - ./data/pdfs:/app/pdfs:ro

  frontend:
    profiles: [ "dev" ]
    build:
      context: ./modules/frontend/sangita-admin-web
      dockerfile: Dockerfile.dev
    ports:
      - "5001:5001"
    volumes:
      - ./modules/frontend/sangita-admin-web/src:/app/src:ro
    environment:
      VITE_API_URL: http://localhost:8080
      API_PROXY_TARGET: http://backend:8080

volumes:
  pgdata:
  gradle-cache:
  extraction-cache:
